<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SmartEdu ID - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>SmartEdu ID</h1>
        <p>Digital Attendance & Activity System</p>

        <div class="card">
            <h2>Login</h2>

            <input type="email" id="email" placeholder="Enter Email">
            <input type="password" id="password" placeholder="Enter Password">

            <select id="role">
                <option value="select">Select Role</option> <!--thiis is just for UI-->
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>

            <button onclick="login()">Login</button>
            <button onclick="register()">Register</button>

            <div id="studentFields" style="display: none;">
                <input type="text" id="studentNameInput" placeholder="Full Name">
                <input type="text" id="address" placeholder="Address">
                <input type="date" id="dob">
                <select id="bloodGroup">
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <input type="file" id="profileImage" accept="image/*">
            </div>
        </div>

        <script type="module">

            import { auth, db } from "./firebase.js";
            import { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
                from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
            import { doc, setDoc, getDoc }
                from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

            // Resize & convert image file to a base64 string (max 300x300, JPEG)
            function resizeImageToBase64(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        const img = new Image();
                        img.onload = function () {
                            const MAX = 300;
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
                            else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
                            const canvas = document.createElement("canvas");
                            canvas.width = w; canvas.height = h;
                            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL("image/jpeg", 0.7));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }

            window.register = async function () {

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const role = document.getElementById("role").value;

                if (role === "select") {
                    alert("Please select a role.");
                    return;
                }

                if (!email) {
                    alert("Please enter the email.");
                    return;
                }

                if (!password) {
                    alert("Please enter the password.");
                    return;
                }

                if (role === "student") {
                    const name = document.getElementById("studentNameInput").value;
                    const address = document.getElementById("address").value;
                    const dob = document.getElementById("dob").value;
                    const bloodGroup = document.getElementById("bloodGroup").value;
                    const imageFile = document.getElementById("profileImage").files[0];

                    if (!name || !address || !dob || !bloodGroup || !imageFile) {
                        alert("Please fill all the fields and select a profile image.");
                        return;
                    }

                    // Age validation: must be 15 or older
                    const dobDate = new Date(dob);
                    const today = new Date();
                    let age = today.getFullYear() - dobDate.getFullYear();
                    const monthDiff = today.getMonth() - dobDate.getMonth();
                    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate())) {
                        age--;
                    }
                    if (age < 15) {
                        alert("Registration allowed only for students aged 15 or above.");
                        return;
                    }
                }

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                    const userData = {
                        email: email,
                        role: role
                    };

                    if (role === "student") {
                        userData.name = document.getElementById("studentNameInput").value;
                        userData.address = document.getElementById("address").value;
                        userData.dob = document.getElementById("dob").value;
                        userData.bloodGroup = document.getElementById("bloodGroup").value;

                        const imageFile = document.getElementById("profileImage").files[0];
                        if (imageFile) {
                            userData.photoURL = await resizeImageToBase64(imageFile);
                        }
                    }

                    await setDoc(doc(db, "users", userCredential.user.uid), userData);

                    alert("Registered Successfully!");

                } catch (error) {
                    if (error.code === "auth/email-already-in-use") {
                        alert("Email is already registered.");
                    } else {
                        alert(error.message);
                    }
                    console.error(error);
                }
            }

            window.login = async function () {

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const role = document.getElementById("role").value;

                if (role === "select") {
                    alert("Please select a role.");
                    return;
                }

                if (!email) {
                    alert("Please enter the email.");
                    return;
                }

                if (!password) {
                    alert("Please enter the password.");
                    return;
                }

                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const uid = userCredential.user.uid;

                    const docRef = doc(db, "users", uid);
                    const docSnap = await getDoc(docRef);

                    const userData = docSnap.data();
                    const selectedRole = document.getElementById("role").value;

                    if (userData.role !== selectedRole) {
                        await signOut(auth);
                        alert("This email is registered as a " + userData.role + ". You cannot log in as a " + selectedRole + ".");
                        return;
                    }

                    if (userData.role === "teacher") {
                        window.location.href = "teacher.html";
                    } else {
                        window.location.href = "student.html";
                    }

                } catch (error) {
                    if (error.code === "auth/invalid-credential") {
                        alert("You have not registered yet. Please register yourself first.");
                    } else {
                        alert(error.message);
                    }
                    console.error(error);
                }
            }

            // Show/hide student fields based on role
            document.getElementById("role").addEventListener("change", function () {
                const fields = document.getElementById("studentFields");
                fields.style.display = this.value === "student" ? "block" : "none";
            });

        </script>


    </div>
</body>

</html>
