<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <div class="container">
        <h1>Student Dashboard</h1>

        <div class="card">
            <h2>Digital ID</h2>
            <div
                style="display: flex; align-items: center; gap: 20px; text-align: left; background: #f8f9fc; padding: 15px; border-radius: 8px; border: 1px solid #e3e6f0;">

                <div style="flex-shrink: 0;">
                    <img id="studentPhoto" src="https://via.placeholder.com/150" alt="Profile Photo"
                        style="width: 150px; height: 150px; object-fit: cover; border-radius: 10px; border: 3px solid #4e73df; background: white;">
                </div>

                <div style="flex-grow: 1; margin: 0; line-height: 1.6;">
                    <p style="margin: 0;"><strong>Name:</strong> <span id="studentName">--</span></p>
                    <p style="margin: 5px 0 0;"><strong>Email ID:</strong> <span id="studentEmail">--</span></p>
                    <p style="margin: 5px 0 0;"><strong>Address:</strong> <span id="studentAddress">--</span></p>
                    <p style="margin: 5px 0 0;"><strong>DOB:</strong> <span id="studentDOB">--</span></p>
                    <p style="margin: 5px 0 0;"><strong>Blood Group:</strong> <span id="studentBloodGroup">--</span></p>
                </div>

            </div>
        </div>

        <div class="card">
            <h2>Attendance</h2>
            <button onclick="checkLocation()">Check Classroom Presence</button>
            <p id="attendanceStatus">Status: Not Checked</p>
            <h3>Session Time Remaining: <span id="studentTimer">--</span></h3>
        </div>

        <div class="card" id="upcomingEventsCard" style="display:none;">
            <h2>Upcoming Events</h2>
            <div id="upcomingEventsContainer" style="display:flex; flex-direction:column; gap:10px;">
                <!-- Event cards go here -->
            </div>
        </div>

        <div class="card">
            <h2>Event Registration Scan</h2>
            <button onclick="startEventQRScanner()" id="startEventScanBtn">Scan Event QR</button>
            <button onclick="closeEventQRScanner()" id="closeEventScanBtn"
                style="display:none; background: #e74a3b;">Close Scanner</button>

            <div id="uploadQrContainer">
                <p style="margin: 10px 0; font-weight: bold;">OR</p>
                <label for="eventQrUpload"
                    style="cursor: pointer; display: inline-block; width: 95%; padding: 10px; background: #1cc88a; color: white; border-radius: 5px; font-weight: bold; box-sizing: border-box; margin: 10px 0;">Upload
                    QR Image</label>
                <input type="file" id="eventQrUpload" accept="image/*" style="display: none;"
                    onchange="handleQRImageUpload(event)">
            </div>

            <div id="eventQrReader" style="width: 100%; max-width: 400px; margin: 15px auto;"></div>
        </div>

        <div class="card">
            <h2>My Attendance History</h2>
            <table id="attendanceHistoryTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Attended (s)</th>
                        <th>Total (s)</th>
                    </tr>
                </thead>
                <tbody id="attendanceHistoryBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Participation Timeline</h2>
            <div id="studentTimelineContainer"
                style="display:flex; flex-direction:column; gap:15px; margin-top:15px; text-align: left; padding-left: 10px; border-left: 2px solid #ccc;">
            </div>
        </div>

        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <script type="module">

        import { auth, db } from "./firebase.js";
        import { doc, setDoc, getDoc, getDocs, collection, query, where, onSnapshot, serverTimestamp, addDoc }
            from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
        import { onAuthStateChanged, signOut }
            from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        window.logout = async function () {
            await signOut(auth);
            window.location.href = "index.html";
        }

        // Fetch and display student data on load
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("studentName").innerText = data.name || "--";
                    document.getElementById("studentEmail").innerText = data.email || "--";
                    document.getElementById("studentAddress").innerText = data.address || "--";
                    document.getElementById("studentDOB").innerText = data.dob || "--";
                    document.getElementById("studentBloodGroup").innerText = data.bloodGroup || "--";

                    // Display image
                    if (data.photoURL) {
                        document.getElementById("studentPhoto").src = data.photoURL;
                    }
                }
                loadAttendanceHistory();
                loadUpcomingEvents();
                loadTimeline();
            }
        });

        let activeSession = null;
        let activeSessionId = null;

        // Get active session (most recent one)
        async function getActiveSession() {
            activeSession = null;
            activeSessionId = null;
            let latestTime = 0;
            const snapshot = await getDocs(collection(db, "sessions"));

            snapshot.forEach((d) => {
                const data = d.data();
                if (data.isActive === true) {
                    const sessionTime = data.startTime.seconds || 0;
                    if (sessionTime >= latestTime) {
                        latestTime = sessionTime;
                        activeSession = data;
                        activeSessionId = d.id;
                    }
                }
            });
        }


        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }
        let countdownInterval = null;
        let insideTimer = 0;
        let attendanceMarked = false;

        window.checkLocation = async function () {
            if (attendanceMarked) {
                alert("Attendance already marked for this session!");
                return;
            }

            await getActiveSession();

            if (!activeSession) {
                document.getElementById("attendanceStatus").innerText = "Status: No active session found";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    const distance = getDistance(
                        lat, lon,
                        activeSession.latitude, activeSession.longitude
                    );

                    if (distance <= activeSession.radius) {
                        document.getElementById("attendanceStatus").innerText = "Status: Present ✅ — Tracking started";

                        // Only start tracking if not already running
                        if (!countdownInterval) {
                            startSessionTracking(activeSession.duration);
                        }
                    } else {
                        document.getElementById("attendanceStatus").innerText = "Status: Outside classroom ❌";
                    }
                },
                function () {
                    document.getElementById("attendanceStatus").innerText = "Status: Location permission denied";
                }
            );
        }

        function startSessionTracking(duration) {
            let remaining = duration;
            const timerElement = document.getElementById("studentTimer");
            timerElement.innerText = remaining + " sec";

            countdownInterval = setInterval(() => {

                // Check if session has ended
                const now = new Date();
                const sessionEnd = activeSession.endTime.seconds
                    ? new Date(activeSession.endTime.seconds * 1000)
                    : new Date(activeSession.endTime);

                if (now >= sessionEnd) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    timerElement.innerText = "Session Ended";

                    // --- POST-SESSION ATTENDANCE DECISION ---
                    const totalDuration = duration;
                    const attendedTime = insideTimer;
                    const remainingTime = totalDuration - attendedTime;
                    const twentyPercent = totalDuration * 0.2;

                    if (attendedTime >= totalDuration) {
                        // CASE 1: Full attendance
                        markAttendance(totalDuration);
                    } else if (remainingTime <= twentyPercent) {
                        // CASE 2: Missed <= 20%
                        markAttendance(totalDuration);
                    } else {
                        // Not enough attendance
                        document.getElementById("attendanceStatus").innerText =
                            "Status: Attendance not marked — attended " + attendedTime + "s / " + totalDuration + "s ❌";
                    }
                    return;
                }

                remaining--;
                timerElement.innerText = remaining + " sec";

                // Track location each second
                navigator.geolocation.getCurrentPosition(
                    function (position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        const distance = getDistance(
                            lat, lon,
                            activeSession.latitude, activeSession.longitude
                        );

                        if (distance <= activeSession.radius) {
                            if (insideTimer < duration) {
                                insideTimer++;
                            }
                            document.getElementById("attendanceStatus").innerText = "Status: Present ✅";
                        } else {
                            // Pause — do NOT reset insideTimer
                            document.getElementById("attendanceStatus").innerText = "Status: Outside classroom (paused) ⏸️";
                        }
                    },
                    function () {
                        document.getElementById("attendanceStatus").innerText = "Status: Location unavailable (paused) ⏸️";
                    }
                );

            }, 1000);
        }

        async function markAttendance(totalDuration) {
            attendanceMarked = true;
            const cappedInsideTimer = Math.min(insideTimer, totalDuration);
            const remainingSeconds = Math.max(0, totalDuration - cappedInsideTimer);

            document.getElementById("studentTimer").innerText = "Completed!";
            document.getElementById("attendanceStatus").innerText =
                "Status: Attendance Marked ✅ (" + cappedInsideTimer + "s / " + totalDuration + "s)";

            await setDoc(
                doc(db, "attendance", auth.currentUser.uid, "sessions", activeSessionId),
                {
                    sessionId: activeSessionId,
                    status: "present",
                    attendedSeconds: cappedInsideTimer,
                    totalDuration: totalDuration,
                    remainingSeconds: remainingSeconds,
                    timestamp: new Date()
                }
            );

            // Log timeline event
            await addDoc(collection(db, "studentTimeline"), {
                studentId: auth.currentUser.uid,
                eventId: activeSessionId,
                eventName: "Class Session",
                actionType: (cappedInsideTimer >= totalDuration * 0.8) ? "attended" : "late",
                timestamp: serverTimestamp(),
                metadata: { duration: cappedInsideTimer }
            });

            alert("Attendance Marked Successfully ✅");
            loadAttendanceHistory();
            loadTimeline();
        }

        // Load attendance history for current student
        async function loadAttendanceHistory() {
            const user = auth.currentUser;
            if (!user) return;

            const tbody = document.getElementById("attendanceHistoryBody");
            tbody.innerHTML = "";

            const historySnap = await getDocs(collection(db, "attendance", user.uid, "sessions"));

            if (historySnap.empty) {
                tbody.innerHTML = '<tr><td colspan="4">No attendance records yet.</td></tr>';
                return;
            }

            const rows = [];
            historySnap.forEach((d) => {
                const data = d.data();
                const date = data.timestamp?.seconds
                    ? new Date(data.timestamp.seconds * 1000).toLocaleDateString()
                    : "--";
                rows.push({ date, ...data });
            });

            rows.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

            rows.forEach((data) => {
                const row = document.createElement("tr");
                row.innerHTML =
                    "<td>" + data.date + "</td>" +
                    "<td>" + (data.status === "present" ? "Present  ✅" : "Absent ❌") + "</td>" +
                    "<td>" + (data.attendedSeconds || 0) + "</td>" +
                    "<td>" + (data.totalDuration || 0) + "</td>";
                tbody.appendChild(row);
            });
        }

        function loadUpcomingEvents() {
            const eventsQuery = query(collection(db, "events"));

            onSnapshot(eventsQuery, (eventsSnapshot) => {
                const container = document.getElementById("upcomingEventsContainer");
                container.innerHTML = "";

                if (eventsSnapshot.empty) {
                    document.getElementById("upcomingEventsCard").style.display = "none";
                    return;
                }

                document.getElementById("upcomingEventsCard").style.display = "block";

                const events = [];
                eventsSnapshot.forEach((d) => {
                    events.push({ id: d.id, ...d.data() });
                });
                events.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                events.forEach(event => {
                    const eventId = event.id;
                    const isOpened = localStorage.getItem(`event_opened_${eventId}`) === "true";

                    const card = document.createElement("div");
                    card.className = "event-card";
                    card.style.border = "1px solid #ddd";
                    card.style.padding = "10px";
                    card.style.borderRadius = "5px";
                    card.style.textAlign = "left";
                    card.style.cursor = "pointer";
                    if (!isOpened) {
                        card.style.borderLeft = "5px solid #1cc88a";
                        card.style.backgroundColor = "#f8fdfa";
                    }

                    const headerLabel = !isOpened ? `<span id="badge-${eventId}" style="background:#e74a3b;color:white;padding:2px 5px;border-radius:3px;font-size:12px;">New Event</span>` : "";

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3 style="margin:0;">${event.eventName}</h3>
                            ${headerLabel}
                        </div>
                        <p style="margin:5px 0 0 0; font-size:14px; color:#555;">${event.date} | ${event.time} | ${event.type}</p>
                        <div id="event-details-${eventId}" style="display:none; margin-top:10px; border-top:1px solid #ddd; padding-top:10px;">
                            <p style="margin:0 0 10px 0;"><strong>Description:</strong> ${event.description}</p>
                            <div style="display:flex; justify-content:center;">
                                <div id="qr-${eventId}"></div>
                            </div>
                        </div>
                    `;

                    card.onclick = () => {
                        const detailsDiv = document.getElementById(`event-details-${eventId}`);
                        if (detailsDiv.style.display === "none") {
                            detailsDiv.style.display = "block";

                            // Load QR if empty
                            const qrContainer = document.getElementById(`qr-${eventId}`);
                            if (qrContainer.innerHTML === "") {
                                new QRCode(qrContainer, {
                                    text: eventId,
                                    width: 150,
                                    height: 150
                                });
                            }

                            if (!isOpened) {
                                localStorage.setItem(`event_opened_${eventId}`, "true");
                                card.style.borderLeft = "1px solid #ddd";
                                card.style.backgroundColor = "transparent";
                                const badge = document.getElementById(`badge-${eventId}`);
                                if (badge) badge.style.display = "none";
                            }
                        } else {
                            detailsDiv.style.display = "none";
                        }
                    };

                    container.appendChild(card);
                });
            });
        }

        let html5QrcodeScanner = null;
        window.startEventQRScanner = function () {
            document.getElementById("startEventScanBtn").style.display = "none";
            document.getElementById("uploadQrContainer").style.display = "none";
            document.getElementById("closeEventScanBtn").style.display = "inline-block";

            html5QrcodeScanner = new Html5QrcodeScanner("eventQrReader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }

        window.closeEventQRScanner = function () {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(() => {
                    document.getElementById("startEventScanBtn").style.display = "inline-block";
                    document.getElementById("uploadQrContainer").style.display = "block";
                    document.getElementById("closeEventScanBtn").style.display = "none";
                });
            }
        }

        async function processEventRegistration(eventId) {
            const studentId = auth.currentUser.uid;

            try {
                // Check if already registered
                const q = query(collection(db, "eventRegistrations"), where("eventId", "==", eventId));
                const snap = await getDocs(q);
                let alreadyRegistered = false;
                snap.forEach(doc => {
                    if (doc.data().studentId === studentId) {
                        alreadyRegistered = true;
                    }
                });

                if (alreadyRegistered) {
                    alert("Already Registered");
                    return;
                }

                // Fetch eventName
                let eventName = "Event Registration";
                try {
                    const eventDoc = await getDoc(doc(db, "events", eventId));
                    if (eventDoc.exists()) {
                        eventName = eventDoc.data().eventName || eventDoc.data().name || eventName;
                    }
                } catch (e) { console.error("Could not fetch event name", e); }

                // Register
                await addDoc(collection(db, "eventRegistrations"), {
                    eventId: eventId,
                    studentId: studentId,
                    registeredAt: serverTimestamp()
                });

                // Log timeline event
                await addDoc(collection(db, "studentTimeline"), {
                    studentId: studentId,
                    eventId: eventId,
                    eventName: eventName,
                    actionType: "registered",
                    timestamp: serverTimestamp(),
                    metadata: {}
                });

                alert("Registration Successful");
                loadTimeline();
            } catch (e) {
                alert("Error registering: " + e.message);
            }
        }

        async function onScanSuccess(decodedText, decodedResult) {
            const eventId = decodedText.trim();
            await html5QrcodeScanner.clear(); // Stop scanning 
            document.getElementById("startEventScanBtn").style.display = "inline-block";
            document.getElementById("uploadQrContainer").style.display = "block";
            document.getElementById("closeEventScanBtn").style.display = "none";

            await processEventRegistration(eventId);
        }

        function onScanError(errorMessage) {
            // Background scan error, ignore
        }

        async function loadTimeline() {
            const user = auth.currentUser;
            if (!user) return;
            try {
                const q = query(collection(db, "studentTimeline"), where("studentId", "==", user.uid));
                const snap = await getDocs(q);
                let timelineData = [];
                snap.forEach(doc => {
                    timelineData.push(doc.data());
                });

                // Sort by timestamp desc locally to avoid requiring complex composite index on standard fields immediately
                timelineData.sort((a, b) => {
                    // Handle case where serverTimestamp hasn't synced yet locally
                    const timeA = a.timestamp?.seconds ? a.timestamp.seconds * 1000 : Date.now();
                    const timeB = b.timestamp?.seconds ? b.timestamp.seconds * 1000 : Date.now();
                    return timeB - timeA;
                });

                const container = document.getElementById("studentTimelineContainer");
                container.innerHTML = "";

                if (timelineData.length === 0) {
                    container.innerHTML = "<p>No participation activity yet.</p>";
                    return;
                }

                const visualStyles = {
                    registered: { color: "#4e73df", icon: "📝", label: "Registered" },
                    attended: { color: "#1cc88a", icon: "✅", label: "Attended" },
                    late: { color: "#f6c23e", icon: "⏰", label: "Late" },
                    no_show: { color: "#e74a3b", icon: "❌", label: "No Show" },
                    certificate_earned: { color: "#f6c23e", icon: "🏆", label: "Certificate Earned" },
                    volunteer: { color: "#6f42c1", icon: "🎤", label: "Volunteer" }
                };

                timelineData.forEach(item => {
                    const style = visualStyles[item.actionType] || { color: "#858796", icon: "ℹ️", label: item.actionType };
                    const dateStr = item.timestamp?.seconds
                        ? new Date(item.timestamp.seconds * 1000).toLocaleString()
                        : new Date().toLocaleString() + " (Syncing)";

                    const div = document.createElement("div");
                    div.style.position = "relative";
                    div.style.paddingBottom = "15px";

                    div.innerHTML = `
                        <div style="position: absolute; left: -19px; top: 0; width: 14px; height: 14px; border-radius: 50%; background: ${style.color}; border: 2px solid white;"></div>
                        <div style="font-weight: bold; font-size: 16px;">
                            ${item.eventName || "Unknown Event"} 
                            <span style="font-size:14px; color:${style.color}; margin-left:10px;">
                                ${style.icon} ${style.label}
                            </span>
                        </div>
                        <div style="font-size: 13px; color: #666; margin-top: 3px;">
                            ${dateStr}
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error("Error loading timeline:", error);
            }
        }

        window.handleQRImageUpload = async function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const html5QrCode = new Html5Qrcode("eventQrReader");

            const addWhitePadding = (sourceFile) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        const padding = 50; // White border size
                        canvas.width = img.width + padding * 2;
                        canvas.height = img.height + padding * 2;
                        const ctx = canvas.getContext("2d");
                        ctx.fillStyle = "white";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, padding, padding);
                        canvas.toBlob(resolve, sourceFile.type || 'image/png');
                    };
                    img.onerror = reject;
                    img.src = URL.createObjectURL(sourceFile);
                });
            };

            try {
                let decodedText;
                try {
                    // Try direct scan first without updating UI layout
                    decodedText = await html5QrCode.scanFile(file, false);
                } catch (e) {
                    // Fallback to padding if direct scan failed (usually due to tight borders)
                    const paddedBlob = await addWhitePadding(file);
                    const paddedFile = new File([paddedBlob], "padded.png", { type: "image/png" });
                    decodedText = await html5QrCode.scanFile(paddedFile, false);
                }

                document.getElementById("eventQrUpload").value = "";
                try { await html5QrCode.clear(); } catch (e) { }

                await processEventRegistration(decodedText.trim());
            } catch (err) {
                alert("QR code not found in the image. Please upload a clear QR code image.");
                document.getElementById("eventQrUpload").value = "";
                try { await html5QrCode.clear(); } catch (e) { }
            }
        }

    </script>
</body>

</html>
